<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Sistema de Registros</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="2_config.js"></script>

    <style>
        /* Paleta de colores heredada del Panel Principal */
        :root {
            --bg-color: #0b141d;
            --card-color: #14212d;
            --accent-color: #003366;
            --success-color: #27ae60;
            --text-color: #ffffff;
            --muted-text: #a0aec0;
            --border-color: #2c3e50;
            --hover-color: #f39c12;
        }

        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }

        .login-wrapper {
            background: var(--card-color);
            padding: 40px 30px;
            border-radius: 10px;
            width: 100%;
            max-width: 350px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            border: 1px solid var(--border-color);
            text-align: center;
        }

        .logo-container {
            background: white; 
            padding: 15px; 
            border-radius: 8px; 
            display: inline-block; 
            margin-bottom: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .logo-container img {
            width: 160px; 
            display: block;
        }

        .login-title {
            margin: 0 0 20px 0;
            font-size: 18px;
            color: var(--text-color);
            font-weight: 600;
            letter-spacing: 1px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group i.icon-left {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted-text);
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px 12px 40px; /* Espacio para el ícono */
            box-sizing: border-box;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-color);
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            border-color: var(--info-color);
            box-shadow: 0 0 5px rgba(52, 152, 219, 0.5);
        }

        .input-group input::placeholder {
            color: var(--muted-text);
        }

        .btn-toggle-pass {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            border: none;
            background: none;
            cursor: pointer;
            color: var(--muted-text);
            padding: 0;
        }

        .btn-toggle-pass:hover {
            color: var(--text-color);
        }

        .btn-enviar { 
            background: var(--accent-color); 
            color: white; 
            border: none; 
            padding: 14px; 
            width: 100%; 
            cursor: pointer; 
            border-radius: 6px; 
            font-weight: bold; 
            font-size: 15px;
            letter-spacing: 1px;
            transition: background 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-enviar:hover { 
            background: var(--hover-color); 
        }

        .btn-enviar:disabled {
            background: #34495e;
            cursor: not-allowed;
        }

        .error-message {
            color: #e74c3c;
            font-size: 13px;
            margin-top: 15px;
            display: none;
            font-weight: bold;
        }
    </style>
</head>
