<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Principal - Registros</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script src="config_nuevo.js"></script>

    <style>
        :root {
            --bg-color: #0b141d;
            --card-color: #14212d;
            --accent-color: #003366;
            --success-color: #27ae60;
            --warning-color: #f39c12;
            --danger-color: #e74c3c;
            --info-color: #3498db;
            --text-color: #ffffff;
            --muted-text: #a0aec0;
            --border-color: #2c3e50;
        }

        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            margin: 0; padding: 0; 
        }
        
        header { 
            background-color: var(--card-color); 
            padding: 10px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--border-color); 
        }

        .user-info { display: flex; align-items: center; gap: 15px; }
        
        .container {
            max-width: 1400px;
            margin: 30px auto;
            padding: 20px;
            background: var(--card-color);
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .header-panel {
            display: flex; justify-content: space-between; 
            align-items: center; gap: 15px; flex-wrap: wrap; 
            margin-bottom: 20px; border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        .table-responsive { overflow-x: auto; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }

        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid var(--border-color); }

        th { background-color: var(--accent-color); color: white; font-weight: 600; }

        tr:hover { background-color: #665112; } 

        .btn-nueva { background: #27ae60; color: white; border: none; padding: 10px 15px; cursor: pointer; border-radius: 5px; font-weight: bold; display: flex; align-items: center; gap: 8px; font-size: 14px; }

        .btn-nueva:hover { background: #f39c12; }

        .btn-logout { background: var(--danger-color); color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; }

        .btn-logout:hover { background: #f39c12; }

        .btn-accion {
            height: 34px; padding: 0 12px; border: none; border-radius: 4px;
            cursor: pointer; color: white; font-size: 12px;
            display: inline-flex; align-items: center; justify-content: center; gap: 6px; margin: 0 2px;
        }

        .btn-form { background-color: #3498db; }

        .btn-form:hover { background: #f39c12; }

        .acciones-td { display: flex; gap: 5px;}

        .badge {
            padding: 4px 8px; border-radius: 12px; font-size: 11px; font-weight: bold;
        }

        .badge-activo { background-color: #27ae60; }

        .badge-pendiente { background-color: #e74c3c; }
    </style>
</head>

<body>

<header>
    <h2>PANEL PRINCIPAL - REGISTROS</h2>
    <div class="user-info">
        <span id="nombre-usuario">Usuario</span> |
        <span id="nombre-sector">Sector</span>
        <button class="btn-logout" onclick="cerrarSesion()">Cerrar Sesión</button>
    </div>
</header>

<div class="container">
    <div class="header-panel">
        <button class="btn-nueva" onclick="nuevoRegistro()">
            <i class="fas fa-plus"></i> NUEVO REGISTRO
        </button>
    </div>

    <div class="table-responsive">
        <table>

            <!-- ✅ TU THEAD EXACTO -->
            <thead>
                <tr>
                    <th style="width: 15%;">ID</th>
                    <th style="width: 15%;">FECHA</th>
                    <th style="width: 15%;">ESTADO</th>
                    <th style="width: 40%;">DESCRIPCIÓN</th>
                    <th style="width: 15%;">ACCIONES</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td><strong>REG-001928</strong></td>
                    <td>28/10/2023</td>
                    <td><span class="badge badge-activo">Activo</span></td>
                    <td>Inspección general</td>
                    <td class="acciones-td">
                        <button class="btn-accion btn-form" onclick="abrirChecklist('REG-001928')">
                            <i class="fas fa-clipboard-list"></i> Checklist
                        </button>
                    </td>
                </tr>
            </tbody>

        </table>
    </div>
</div>

<script>

function nuevoRegistro() {

    const caracteres = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
    let nuevoID = "";

    for (let i = 0; i < 6; i++) {
        nuevoID += caracteres.charAt(Math.floor(Math.random() * caracteres.length));
    }

    const usuario = sessionStorage.getItem("usuario") || "Usuario";
    const sector = sessionStorage.getItem("sector") || "Sector";
    const fecha = new Date().toLocaleDateString("es-ES");

    const data = {
        id: nuevoID,
        usuario: usuario,
        sector: sector,
        fecha: fecha,
        estado: "Pendiente"
    };

    const url = CONFIG.URL_APPS_SCRIPT;

    fetch(url, {
        method: "POST",
        body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(() => {
        window.location.href = "checklist.html?id=" + nuevoID;
    })
    .catch(() => {
        alert("Error al guardar");
    });
}

function abrirChecklist(id) {
    window.location.href = "checklist.html?id=" + id;
}

function cerrarSesion() {
    sessionStorage.clear();
    window.location.href = "index.html";
}

</script>

</body>
</html>
