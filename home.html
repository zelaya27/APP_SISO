<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Principal - Registros</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>

/* =========================
   VARIABLES
========================= */
:root {
    --bg-color: #0b141d;
    --card-color: #14212d;
    --accent-color: #003366;
    --success-color: #27ae60;
    --success-hover: #219653;
    --danger-color: #e74c3c;
    --text-color: #ffffff;
    --muted-text: #a0aec0;
    --border-color: #2c3e50;
    --blue-active: #3b82f6;
    --blue-hover: #2b6cb0;
}

/* =========================
   BASE
========================= */
body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background-color: var(--bg-color);
    color: var(--text-color);
    margin: 0;
    padding: 0;
    overflow-x: hidden;
}

/* =========================
   HEADER
========================= */
header {
    background-color: var(--card-color);
    padding: 20px 15px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border-color);
}

.header-title-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
}

.header-title-container h2 {
    margin: 0;
    font-size: 22px;
    font-weight: bold;
    letter-spacing: 2px;
}

.user-info {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
    background-color: rgba(0,0,0,0.2);
    padding: 8px 15px;
    border-radius: 20px;
}

/* =========================
   CONTAINER
========================= */
.container {
    max-width: 1400px;
    margin: 20px auto;
    padding: 15px;
}

/* =========================
   BOTÓN NUEVO
========================= */
.btn-nueva {
    background: var(--success-color);
    color: white;
    border: none;
    padding: 14px 20px;
    border-radius: 8px;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
    width: 100%;
    max-width: 400px;
}

/* =========================
   FILTROS
========================= */
.filtros-flex {
    display: flex;
    gap: 10px;
    justify-content: center;
    overflow-x: auto;
}

.btn-filtro {
    background: #1a2a3a;
    color: var(--muted-text);
    border: 1px solid var(--border-color);
    padding: 8px 16px;
    border-radius: 20px;
    cursor: pointer;
}

.btn-filtro.activo {
    background: var(--blue-active);
    color: white;
}

/* =========================
   GRID
========================= */
.registros-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 15px;
}

@media (min-width: 768px) {
    .registros-grid { grid-template-columns: repeat(2, 1fr); }
}

@media (min-width: 1024px) {
    .registros-grid { grid-template-columns: repeat(3, 1fr); }
}

/* =========================
   CARD
========================= */
.registro-card {
    background: #1a2a3a;
    border: 1px solid var(--border-color);
    border-radius: 10px;
    padding: 15px;
}

/* =========================
   BOTONES
========================= */
.btn-editar {
    border: 1px solid var(--blue-active);
    background: transparent;
    color: var(--blue-active);
    padding: 6px 14px;
    border-radius: 20px;
}

.btn-pdf {
    border: 1px solid var(--danger-color);
    background: transparent;
    color: var(--danger-color);
    padding: 6px 14px;
    border-radius: 20px;
}

</style>
</head>

<body>

<header>
    <div class="header-title-container">
        <div style="background:white;padding:6px;border-radius:6px;">
            <img src="https://raw.githubusercontent.com/zelaya27/IMAGENES_AZ/main/UTCD%20Vertical.png" height="35">
        </div>
        <h2>CHECKLIST</h2>
    </div>

    <div class="user-info">
        <span id="nombre-usuario">Usuario</span> |
        <span id="nombre-sector">Sector</span> |
        <button onclick="cerrarSesion()">Salir</button>
    </div>
</header>

<div class="container">

    <button class="btn-nueva" onclick="nuevoRegistro()">
        NUEVO REGISTRO
    </button>

    <div class="filtros-flex">
        <button class="btn-filtro activo" onclick="filtrar('Todos')">Todos</button>
        <button class="btn-filtro" onclick="filtrar('Pendiente')">Pendientes</button>
        <button class="btn-filtro" onclick="filtrar('Revisado')">Revisados</button>
    </div>

    <div id="contenedor-registros" class="registros-grid"></div>

</div>

<script src="config.js"></script>

<script>

let registrosGlobales = [];
let filtroEstadoActual = "Todos";

document.addEventListener("DOMContentLoaded", () => {

    const user = sessionStorage.getItem("usuario");
    const sector = sessionStorage.getItem("sector");

    if (!user) location.href = "index.html";

    document.getElementById("nombre-usuario").textContent = user;
    document.getElementById("nombre-sector").textContent = sector;

    cargarRegistros();
});

// =========================
function cerrarSesion() {
    sessionStorage.clear();
    location.href = "index.html";
}

function nuevoRegistro() {
    location.href = "checklist.html";
}

function filtrar(e) {
    filtroEstadoActual = e;
    renderizar();
}

// =========================
async function cargarRegistros() {

    const res = await fetch(`${CONFIG.URL_APPS_SCRIPT}?action=obtenerRegistros`);
    const data = await res.json();

    const sector = sessionStorage.getItem("sector");

    registrosGlobales = data.filter(r => {
        if (!r.col_2) return false;
        if (sector === "GENERAL") return true;
        return r.col_2 === sector;
    });

    renderizar();
}

// =========================
function renderizar() {

    const cont = document.getElementById("contenedor-registros");
    cont.innerHTML = "";

    let data = registrosGlobales;

    if (filtroEstadoActual !== "Todos") {
        data = data.filter(r =>
            (r.col_4 || "Pendiente").toLowerCase() === filtroEstadoActual.toLowerCase()
        );
    }

    data = data.reverse();

    data.forEach(r => {

        const div = document.createElement("div");
        div.className = "registro-card";

        div.innerHTML = `
            <div>
                <b>#${r.col_0}</b> - ${r.col_4 || "Pendiente"}
            </div>

            <div>${r.col_2}</div>

            <div style="margin-top:10px;">
                <button class="btn-pdf" onclick="generarPDF('${r.col_0}', event)">PDF</button>
                <button class="btn-editar" onclick="editar('${r.col_0}')">Editar</button>
            </div>
        `;

        cont.appendChild(div);
    });
}

// =========================
// FIX PDF COMPLETO
// =========================
async function generarPDF(id, event) {

    const registro = registrosGlobales.find(r => r.col_0 == id);
    if (!registro) return alert("No encontrado");

    const btn = event.target.closest("button");

    const old = btn.innerHTML;
    btn.innerHTML = "Generando...";
    btn.disabled = true;

    try {

        const payload = {
            action: "generarPDF",
            checklist: registro
        };

        const res = await fetch(CONFIG.URL_APPS_SCRIPT, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (!data.url) throw new Error("No PDF");

        window.open(data.url, "_blank");

    } catch (e) {
        alert("Error PDF: " + e.message);
    } finally {
        btn.innerHTML = old;
        btn.disabled = false;
    }
}

function editar(id) {
    location.href = `checklist.html?id=${id}&modo=editar`;
}

</script>

</body>
</html>
