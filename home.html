<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Principal - Registros</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="home.css">
</head>
<body>

    <header>
        <div style="display: flex; align-items: center; gap: 20px;">
            <div style="background: white; padding: 5px 10px; border-radius: 4px; display: flex;">
                <img src="https://raw.githubusercontent.com/zelaya27/IMAGENES_AZ/main/UTCD%20Vertical.png" height="30" alt="Logo UTCD">
            </div>
            <h2 style="margin: 0; color: #ffffff; font-size: 20px; font-weight: bold;">PANEL PRINCIPAL - REGISTROS</h2>
        </div>
        <div class="user-info">
            <span class="info-item"><i class="fas fa-user-circle"></i> <span id="nombre-usuario">Usuario</span></span>
            <span>|</span>
            <span class="info-item"><i class="fas fa-map-marker-alt"></i> <span id="nombre-sector">Sector</span></span>
            <button class="btn-logout" onclick="cerrarSesion()"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</button>
        </div>
    </header>

    <div class="container">
        <div class="header-panel">
            <button class="btn-nueva" onclick="nuevoRegistro()">
                <i class="fas fa-plus"></i> NUEVO REGISTRO
            </button>
            <div class="filtros-contenedor">
                <div class="filtros-grupo">
                    <label>Mostrar:</label>
                    <select id="limitSelector" class="input-filtro">
                        <option value="10">Últimos 10</option>
                        <option value="ALL">Todos</option>
                    </select>
                </div>
                <button class="btn-limpiar"><i class="fas fa-times-circle"></i> Limpiar</button>
            </div>
        </div>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                       <th style="width: 15%;">ID</th>
                        <th style="width: 15%;">FECHA</th>
                        <th style="width: 15%;">ESTADO</th>
                        <th style="width: 40%;">DESCRIPCIÓN</th>
                        <th style="width: 15%;">ACCIONES</th>
                    </tr>
                </thead>
                <tbody id="tabla-body">
                    </tbody>
            </table>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="home.js"></script>
</body>
</html>
