<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISO - Nueva Lista de Chequeo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* =========================================
           VARIABLES Y BASE (DARK MODE)
        ========================================= */
        :root {
            --bg-color: #0b141d;
            --card-color: #14212d;
            --accent-color: #003366;
            --success-color: #27ae60;
            --danger-color: #e74c3c;
            --text-color: #ffffff;
            --muted-text: #a0aec0;
            --border-color: #2c3e50;
            --blue-active: #3b82f6;
            --blue-hover: #2b6cb0;
        }

        /* Bloquear scroll horizontal en móviles */
        body, html {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            overflow-x: hidden; 
        }

        /* =========================================
           HEADER MÓVIL
        ========================================= */
        header {
            background-color: var(--card-color);
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 20;
        }

        header h2 {
            margin: 0;
            color: #ffffff;
            font-size: 16px; /* Más pequeño para celular */
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
            padding: 15px;
            background: var(--bg-color); /* Fondo oscuro natural en móvil */
        }

        /* =========================================
           WIZARD (PASOS) ADAPTADO A MÓVIL
        ========================================= */
        .steps-container {
            display: flex;
            justify-content: space-between; /* Espaciado uniforme */
            align-items: center;
            margin-bottom: 25px;
            position: relative;
            background: var(--card-color);
            padding: 15px 10px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .step-indicator {
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 2;
            flex: 1;
        }

        .step-circle {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background-color: var(--bg-color);
            border: 2px solid var(--border-color);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 14px;
            color: var(--muted-text);
            transition: all 0.3s ease;
        }

        .step-label {
            margin-top: 6px;
            font-size: 11px;
            font-weight: 600;
            color: var(--muted-text);
            text-transform: uppercase;
            text-align: center;
        }

        .step-line {
            height: 2px;
            background-color: var(--border-color);
            flex-grow: 1;
            margin: 0 -15px;
            transform: translateY(-12px);
            z-index: 1;
        }

        /* Estados de Pasos */
        .step-indicator.active .step-circle {
            border-color: var(--blue-active);
            color: var(--text-color);
            background-color: var(--accent-color);
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }
        .step-indicator.active .step-label { color: var(--blue-active); }
        .step-indicator.completed .step-circle { border-color: var(--success-color); background-color: var(--success-color); color: white; }
        .step-indicator.completed + .step-line { background-color: var(--success-color); }

        /* =========================================
           FORMULARIO MÓVIL (Zonas Táctiles Amplias)
        ========================================= */
        .step-content { display: none; }
        .step-content.activo { 
            display: block; 
            animation: fadeIn 0.3s ease; 
            background: var(--card-color);
            padding: 20px 15px;
            border-radius: 12px;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        h3 { border-bottom: 1px solid var(--border-color); padding-bottom: 8px; color: var(--blue-active); font-size: 16px; margin-top: 0; margin-bottom: 20px; }

        /* Mobile First Grid: 1 Columna por defecto */
        .form-grid { display: grid; grid-template-columns: 1fr; gap: 18px; }

        /* Media Query para Tablets o PC (Más de 600px) */
        @media (min-width: 600px) { .form-grid { grid-template-columns: repeat(2, 1fr); } }

        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group.full-width { grid-column: 1 / -1; }
        
        label { font-size: 13px; color: var(--muted-text); font-weight: 600; }
        
        /* Ajuste clave para móvil: 16px previene el zoom en iOS, padding amplio facilita el tacto */
        input, select, textarea { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            border: 1px solid var(--border-color); 
            border-radius: 8px; 
            padding: 12px 15px; 
            font-size: 16px; 
            outline: none; 
            width: 100%;
            box-sizing: border-box;
            appearance: none; /* Limpia estilos nativos molestos */
        }
        
        /* Restaurar flechita en selects tras appearance:none */
        select { background-image: url('data:image/svg+xml;utf8,<svg fill="%23a0aec0" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/><path d="M0 0h24v24H0z" fill="none"/></svg>'); background-repeat: no-repeat; background-position-x: 95%; background-position-y: 50%; }

        input:focus, select:focus, textarea:focus { border-color: var(--blue-active); }
        input[readonly], input[disabled] { background-color: #080f15; color: var(--muted-text); opacity: 0.8; }
        .hidden-field { display: none; }

        /* =========================================
           BOTONES PEGAJOSOS (STICKY BOTTOM BAR)
        ========================================= */
        .form-actions { 
            display: flex; 
            justify-content: space-between; 
            gap: 10px;
            padding: 15px; 
            background: var(--card-color);
            position: fixed; 
            bottom: 0; 
            left: 0; 
            right: 0;
            border-top: 1px solid var(--border-color);
            z-index: 100;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.4);
        }

        /* Espacio final para que el footer no tape el último input */
        .espacio-footer { height: 80px; width: 100%; }

        .btn-wizard { 
            flex: 1;
            padding: 12px 10px; 
            font-size: 14px; 
            font-weight: bold; 
            border-radius: 8px; 
            cursor: pointer; 
            border: none; 
            display: flex; 
            justify-content: center;
            align-items: center; 
            gap: 8px; 
        }

        .btn-back-header { background-color: transparent; color: var(--muted-text); border: 1px solid var(--border-color); padding: 6px 12px; border-radius: 5px; cursor: pointer; }
        .btn-back { background-color: #2c3e50; color: white; }
        .btn-next { background-color: var(--blue-active); color: white; }
        .btn-save { background-color: var(--success-color); color: white; }
        /* =========================================
   ESTÉTICA PASO 3: SELECCIÓN MÚLTIPLE (MÓVIL)
========================================= */
.riesgos-grid {
    display: grid;
    grid-template-columns: 1fr; /* 1 columna en móvil para mejor lectura */
    gap: 12px;
    margin-bottom: 20px;
}

@media (min-width: 600px) {
    .riesgos-grid { grid-template-columns: repeat(2, 1fr); } /* 2 en tablet/PC */
}

.riesgo-item {
    display: flex;
    align-items: center;
    gap: 15px;
    background-color: var(--bg-color);
    border: 2px solid var(--border-color);
    padding: 14px 16px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.3s ease;
    -webkit-tap-highlight-color: transparent; /* Quita el destello azul feo en móviles */
}

/* Ocultar el checkbox nativo y usar CSS */
.riesgo-item input[type="checkbox"] {
    width: 24px;
    height: 24px;
    accent-color: var(--blue-active);
    margin: 0;
    cursor: pointer;
    flex-shrink: 0; /* Evita que el checkbox se encoja con textos largos */
}

.riesgo-text {
    font-size: 14px;
    color: var(--text-color);
    line-height: 1.3;
    font-weight: 500;
}

/* Efecto cuando la tarjeta está seleccionada (Usando la pseudo-clase :has de CSS moderno) */
.riesgo-item:has(input:checked) {
    border-color: var(--blue-active);
    background-color: rgba(59, 130, 246, 0.1); /* Fondo azul translúcido */
}
    </style>
</head>

    <!-- JS de lógica (Mantenido intacto) -->
    <script>
        function verificarActividad() {
            const val = document.getElementById('col_7').value;
            const caja = document.getElementById('grupo_col_8');
            if (val === "OTRO") { caja.classList.remove('hidden-field'); } 
            else { caja.classList.add('hidden-field'); document.getElementById('col_8').value = ""; }
        }

        function verificarEmpresa() {
            const val = document.getElementById('col_15').value;
            const caja = document.getElementById('grupo_col_16');
            if (val === "CONTRATISTA") { caja.classList.remove('hidden-field'); } 
            else { caja.classList.add('hidden-field'); document.getElementById('col_16').value = ""; }
        }

        function calcularTiempoEstimado() {
            const inicio = document.getElementById('col_17').value;
            const fin = document.getElementById('col_18').value;
            if (inicio && fin) {
                const [hI, mI] = inicio.split(':').map(Number);
                const [hF, mF] = fin.split(':').map(Number);
                let minI = (hI * 60) + mI;
                let minF = (hF * 60) + mF;
                if (minF < minI) minF += (24 * 60); 
                document.getElementById('col_19').value = ((minF - minI) / 60).toFixed(2);
            }
        }
let pasoActual = 1;
        const TOTAL_PASOS = 3; // Añadimos esta variable para que sepa que ahora son 3 pasos

        function cambiarPaso(dir) {
            document.getElementById(`step-${pasoActual}`).classList.remove('activo');
            document.getElementById(`ind-${pasoActual}`).classList.remove('active');
            if (dir === 1) document.getElementById(`ind-${pasoActual}`).classList.add('completed');
            
            pasoActual += dir;
            
            document.getElementById(`step-${pasoActual}`).classList.add('activo');
            document.getElementById(`ind-${pasoActual}`).classList.add('active');
            if (dir === -1) document.getElementById(`ind-${pasoActual}`).classList.remove('completed');

            // AQUÍ ESTABA EL ERROR: Ahora usamos TOTAL_PASOS en lugar de números fijos
            document.getElementById('btnAnterior').style.display = pasoActual === 1 ? 'none' : 'flex';
            document.getElementById('btnSiguiente').style.display = pasoActual === TOTAL_PASOS ? 'none' : 'flex';
            document.getElementById('btnGuardar').style.display = pasoActual === TOTAL_PASOS ? 'flex' : 'none';
            
            // Subir al inicio suavemente al cambiar de paso
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            document.getElementById('col_0').value = urlParams.get('id') || Math.random().toString(36).substring(2, 8).toUpperCase();
            document.getElementById('col_1').value = sessionStorage.getItem("usuario") || "Usuario App";
            document.getElementById('col_2').value = sessionStorage.getItem("sector") || "Desconocido";
            document.getElementById('col_3').value = new Date().toLocaleDateString('es-ES');
        });

        async function enviarFormulario() {
            const btn = document.getElementById('btnGuardar');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Guardando...';

            const params = new URLSearchParams();
            params.append("action", "guardarRespuestasChecklist");
            for(let i=0; i<=25; i++) {
                let el = document.getElementById(`col_${i}`);
                if(el) params.append(`col_${i}`, el.value);
            }

            // Aquí agregarás tu fetch real a URL_APPS_SCRIPT
            setTimeout(() => {
                alert("¡Registro guardado correctamente!");
                window.location.href = "home.html";
            }, 1000);
        }
    </script>
</body>
