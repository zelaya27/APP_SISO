<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISO - Nueva Lista de Chequeo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Sincronizado con la paleta de home.css */
        :root {
            --bg-color: #0b141d;
            --card-color: #14212d;
            --accent-color: #003366;
            --success-color: #27ae60;
            --danger-color: #e74c3c;
            --text-color: #ffffff;
            --muted-text: #a0aec0;
            --border-color: #2c3e50;
            --blue-active: #3b82f6;
            --blue-hover: #2b6cb0;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
        }

        header {
            background-color: var(--card-color);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .container {
            max-width: 1000px;
            margin: 30px auto;
            padding: 25px;
            background: var(--card-color);
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }

        /* =========================================
           ESTÉTICA DE PASOS (WIZARD STYLE)
        ========================================= */
        .steps-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 35px;
            position: relative;
        }

        .step-indicator {
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 2;
            width: 140px;
        }

        .step-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--bg-color);
            border: 2px solid var(--border-color);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            color: var(--muted-text);
            transition: all 0.4s ease;
        }

        .step-label {
            margin-top: 8px;
            font-size: 12px;
            font-weight: 600;
            color: var(--muted-text);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.4s ease;
        }

        /* Línea de unión entre pasos */
        .step-line {
            height: 2px;
            background-color: var(--border-color);
            flex-grow: 0.2;
            max-width: 180px;
            margin: 0 -10px;
            transform: translateY(-10px);
            z-index: 1;
            transition: all 0.4s ease;
        }

        /* ESTADO ACTIVO / ILUMINADO (Estilo Maniobras) */
        .step-indicator.active .step-circle {
            border-color: var(--blue-active);
            color: var(--text-color);
            background-color: var(--accent-color);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.6);
        }

        .step-indicator.active .step-label {
            color: var(--blue-active);
            text-shadow: 0 0 8px rgba(59, 130, 246, 0.3);
        }

        /* ESTADO COMPLETADO */
        .step-indicator.completed .step-circle {
            border-color: var(--success-color);
            background-color: var(--success-color);
            color: white;
        }

        .step-indicator.completed + .step-line {
            background-color: var(--success-color);
        }

        /* =========================================
           CONTENEDORES DE FORMULARIO
        ========================================= */
        .step-content {
            display: none; /* Se controla por JS */
        }

        .step-content.activo {
            display: block;
            animation: fadeIn 0.4s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h3 {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            color: var(--blue-active);
            font-size: 18px;
            margin-bottom: 20px;
        }

        /* Formulario en Grid de 2 o 3 columnas */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        label {
            font-size: 13px;
            color: var(--muted-text);
            font-weight: 600;
        }

        input, select, textarea {
            background-color: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 10px 12px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--blue-active);
            box-shadow: 0 0 5px rgba(59, 130, 246, 0.2);
        }

        input[readonly] {
            background-color: #080f15;
            color: var(--muted-text);
            cursor: not-allowed;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        /* =========================================
           BOTONES DE NAVEGACIÓN
        ========================================= */
        .form-actions {
            display: flex;
            justify-content: space-between;
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
            margin-top: 20px;
        }

        .btn-wizard {
            padding: 10px 24px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 50px; /* Estilo píldora */
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-back {
            background-color: transparent;
            color: var(--muted-text);
            border: 1px solid var(--border-color);
        }

        .btn-back:hover {
            background-color: #1a2a3a;
            color: var(--text-color);
        }

        .btn-next {
            background-color: var(--blue-active);
            color: white;
            margin-left: auto; /* Empuja a la derecha si no hay botón atrás */
        }

        .btn-next:hover {
            background-color: var(--blue-hover);
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.4);
        }

        .btn-save {
            background-color: var(--success-color);
            color: white;
        }

        .btn-save:hover {
            background-color: #219653;
            box-shadow: 0 0 10px rgba(39, 174, 96, 0.4);
        }
    </style>
</head>
<body>

    <header>
        <div style="display: flex; align-items: center; gap: 15px;">
            <button class="btn-wizard btn-back" style="padding: 6px 12px; font-size: 12px;" onclick="location.href='home.html'">
                <i class="fas fa-arrow-left"></i> Volver
            </button>
            <h2 style="margin: 0; color: #ffffff; font-size: 18px; font-weight: bold;">SISO - CONTROL PREOPERATIVO</h2>
        </div>
    </header>

    <div class="container">
        
        <div class="steps-container">
            <div class="step-indicator active" id="ind-1">
                <div class="step-circle">1</div>
                <div class="step-label">Datos de Control</div>
            </div>
            <div class="step-line"></div>
            <div class="step-indicator" id="ind-2">
                <div class="step-circle">2</div>
                <div class="step-label">SISO & Seguridad</div>
            </div>
        </div>

        <form id="checklistForm">
            
            <div class="step-content activo" id="step-1">
                <h3><i class="fas fa-id-card"></i> Paso 1: Información General e Inspección de Equipo</h3>
                
                <div class="form-grid">
                    <div class="form-group">
                        <label>ID Registro (Auto)</label>
                        <input type="text" id="col_0" name="ID" readonly placeholder="Cargando ID...">
                    </div>
                    <div class="form-group">
                        <label>Fecha</label>
                        <input type="text" id="col_1" name="FECHA" readonly>
                    </div>
                    <div class="form-group">
                        <label>Usuario / Inspector</label>
                        <input type="text" id="col_2" name="USUARIO" readonly>
                    </div>
                    <div class="form-group">
                        <label>Sector / Área</label>
                        <input type="text" id="col_3" name="SECTOR" readonly>
                    </div>
                    <div class="form-group">
                        <label>Tipo de Vehículo / Equipo</label>
                        <select id="col_4" name="TIPO_EQUIPO" required>
                            <option value="">Seleccione...</option>
                            <option value="Camioneta">Camioneta</option>
                            <option value="Montacargas">Montacargas</option>
                            <option value="Camión">Camión</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Código Interno / Placa</label>
                        <input type="text" id="col_5" name="PLACA" placeholder="Ej: M-04 o ABC-123" required>
                    </div>
                    <div class="form-group">
                        <label>Kilometraje / Horómetro</label>
                        <input type="number" id="col_6" name="KILOMETRAJE" placeholder="Ingrese valor actual" required>
                    </div>
                    <div class="form-group">
                        <label>Sistema de Luces (Altas/Bajas/Cruce)</label>
                        <select id="col_7" name="LUCES"><option value="OK">OK</option><option value="NO OK">NO OK</option><option value="N/A">N/A</option></select>
                    </div>
                    <div class="form-group">
                        <label>Frenos (Servicio y Emergencia)</label>
                        <select id="col_8" name="FRENOS"><option value="OK">OK</option><option value="NO OK">NO OK</option><option value="N/A">N/A</option></select>
                    </div>
                    <div class="form-group">
                        <label>Dirección y Suspensión</label>
                        <select id="col_9" name="DIRECCION"><option value="OK">OK</option><option value="NO OK">NO OK</option><option value="N/A">N/A</option></select>
                    </div>
                    <div class="form-group">
                        <label>Neumáticos (Presión y Cocada)</label>
                        <select id="col_10" name="NEUMATICOS"><option value="OK">OK</option><option value="NO OK">NO OK</option><option value="N/A">N/A</option></select>
                    </div>
                    <div class="form-group">
                        <label>Espejos y Parabrisas</label>
                        <select id="col_11" name="ESPEJOS"><option value="OK">OK</option><option value="NO OK">NO OK</option><option value="N/A">N/A</option></select>
                    </div>
                    <div class="form-group">
                        <label>Nivel de Fluidos (Aceite/Agua)</label>
                        <select id="col_12" name="FLUIDOS"><option value="OK">OK</option><option value="NO OK">NO OK</option><option value="N/A">N/A</option></select>
                    </div>
                    <div class="form-group">
                        <label>Alarma de Reversa y Bocina</label>
                        <select id="col_13" name="BOCINA"><option value="OK">OK</option><option value="NO OK">NO OK</option><option value="N/A">N/A</option></select>
                    </div>
                    <div class="form-group">
                        <label>Cinturón de Seguridad</label>
                        <select id="col_14" name="CINTURON"><option value="OK">OK</option><option value="NO OK">NO OK</option><option value="N/A">N/A</option></select>
                    </div>
                </div>
            </div>

            <div class="step-content" id="step-2">
                <h3><i class="fas fa-shield-alt"></i> Paso 2: Equipo de Protección Personal y Emergencias</h3>
                
                <div class="form-grid">
                    <div class="form-group">
                        <label>Uso de Casco de Seguridad</label>
                        <select id="col_15" name="EPP_CASCO"><option value="Cumple">Cumple</option><option value="No Cumple">No Cumple</option><option value="N/A">N/A</option></select>
                    </div>
                    <div class="form-group">
                        <label>Calzado de Seguridad (Botas)</label>
                        <select id="col_16" name="EPP_BOTAS"><option value="Cumple">Cumple</option><option value="No Cumple">No Cumple</option><option value="N/A">N/A</option></select>
                    </div>
                    <div class="form-group">
                        <label>Chaleco Reflectivo</label>
                        <select id="col_17" name="EPP_CHALECO"><option value="Cumple">Cumple</option><option value="No Cumple">No Cumple</option><option value="N/A">N/A</option></select>
                    </div>
                    <div class="form-group">
                        <label>Protección Ocular (Gafas)</label>
                        <select id="col_18" name="EPP_GAFAS"><option value="Cumple">Cumple</option><option value="No Cumple">No Cumple</option><option value="N/A">N/A</option></select>
                    </div>
                    <div class="form-group">
                        <label>Extintor PQS (Vigente y Cargado)</label>
                        <select id="col_19" name="EMERG_EXTINTOR"><option value="OK">OK</option><option value="NO OK">NO OK</option><option value="N/A">N/A</option></select>
                    </div>
                    <div class="form-group">
                        <label>Botiquín de Primeros Auxilios</label>
                        <select id="col_20" name="EMERG_BOTIQUIN"><option value="OK">OK</option><option value="NO OK">NO OK</option><option value="N/A">N/A</option></select>
                    </div>
                    <div class="form-group">
                        <label>Conos / Triángulos de Seguridad</label>
                        <select id="col_21" name="EMERG_CONOS"><option value="OK">OK</option><option value="NO OK">NO OK</option><option value="N/A">N/A</option></select>
                    </div>
                    <div class="form-group">
                        <label>Kit Antiderrames</label>
                        <select id="col_22" name="EMERG_ANTIDERRAME"><option value="OK">OK</option><option value="NO OK">NO OK</option><option value="N/A">N/A</option></select>
                    </div>
                    <div class="form-group full-width">
                        <label>Observaciones Adicionales / Comentarios</label>
                        <textarea id="col_23" name="OBSERVACIONES" placeholder="Escriba aquí si detectó alguna anomalía..."></textarea>
                    </div>
                </div>
            </div>

            <div class="form-actions">
                <button type="button" class="btn-wizard btn-back" id="btnAnterior" style="display: none;" onclick="cambiarPaso(-1)">
                    <i class="fas fa-chevron-left"></i> Anterior
                </button>
                <button type="button" class="btn-wizard btn-next" id="btnSiguiente" onclick="cambiarPaso(1)">
                    Siguiente <i class="fas fa-chevron-right"></i>
                </button>
                <button type="button" class="btn-wizard btn-save" id="btnGuardar" style="display: none;" onclick="enviarFormulario()">
                    <i class="fas fa-save"></i> Guardar Checklist
                </button>
            </div>

        </form>
    </div>

    <script>
        // --- LÓGICA DEL WIZARD (PASOS) ---
        let pasoActual = 1;

        function cambiarPaso(direccion) {
            // Validaciones básicas de campos obligatorios en el paso 1 antes de avanzar
            if (direccion === 1 && pasoActual === 1) {
                if (!document.getElementById('col_4').value || !document.getElementById('col_5').value || !document.getElementById('col_6').value) {
                    alert("Por favor rellene los campos obligatorios del equipo (Tipo, Placa y Kilometraje) antes de continuar.");
                    return;
                }
            }

            // Ocultar paso actual
            document.getElementById(`step-${pasoActual}`).classList.remove('activo');
            document.getElementById(`ind-${pasoActual}`).classList.remove('active');
            
            if (direccion === 1) {
                document.getElementById(`ind-${pasoActual}`).classList.add('completed');
            }

            // Actualizar número de paso
            pasoActual += direccion;

            // Mostrar nuevo paso
            document.getElementById(`step-${pasoActual}`).classList.add('activo');
            document.getElementById(`ind-${pasoActual}`).classList.add('active');
            if (direccion === -1) {
                document.getElementById(`ind-${pasoActual}`).classList.remove('completed');
            }

            // Control de botones
            if (pasoActual === 1) {
                document.getElementById('btnAnterior').style.display = 'none';
                document.getElementById('btnSiguiente').style.display = 'flex';
                document.getElementById('btnGuardar').style.display = 'none';
            } else if (pasoActual === 2) {
                document.getElementById('btnAnterior').style.display = 'flex';
                document.getElementById('btnSiguiente').style.display = 'none';
                document.getElementById('btnGuardar').style.display = 'flex';
            }
        }

        // --- CARGA INICIAL: CAPTURAR DATOS DE LA URL Y DE LA SESIÓN ---
        document.addEventListener('DOMContentLoaded', () => {
            // 1. Obtener ID desde la URL (?id=XXXXXX)
            const urlParams = new URLSearchParams(window.location.search);
            const idRegistro = urlParams.get('id');
            
            if (!idRegistro) {
                alert("Error: No se detectó un ID de Checklist válido.");
                window.location.href = "home.html";
                return;
            }

            // Inyectar datos en los campos iniciales de control (Paso 1)
            document.getElementById('col_0').value = idRegistro;
            document.getElementById('col_1').value = new Date().toLocaleDateString('es-ES');
            document.getElementById('col_2').value = sessionStorage.getItem("usuario") || "Desconocido";
            document.getElementById('col_3').value = sessionStorage.getItem("sector") || "General";
        });

        // --- FUNCIÓN PARA ENVIAR EL CHECKLIST (MÉTODO POST) ---
        async function enviarFormulario() {
            const btn = document.getElementById('btnGuardar');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Guardando...';

            // Armamos el array o el mapa de datos ordenados tal como llegarán a Google Sheets
            // Mapeando directamente desde col_0 hasta col_23
            const datosChecklist = {
                action: "guardarRespuestasChecklist",
                col_0: document.getElementById('col_0').value,
                col_1: document.getElementById('col_1').value,
                col_2: document.getElementById('col_2').value,
                col_3: document.getElementById('col_3').value,
                col_4: document.getElementById('col_4').value,
                col_5: document.getElementById('col_5').value,
                col_6: document.getElementById('col_6').value,
                col_7: document.getElementById('col_7').value,
                col_8: document.getElementById('col_8').value,
                col_9: document.getElementById('col_9').value,
                col_10: document.getElementById('col_10').value,
                col_11: document.getElementById('col_11').value,
                col_12: document.getElementById('col_12').value,
                col_13: document.getElementById('col_13').value,
                col_14: document.getElementById('col_14').value,
                // Paso 2
                col_15: document.getElementById('col_15').value,
                col_16: document.getElementById('col_16').value,
                col_17: document.getElementById('col_17').value,
                col_18: document.getElementById('col_18').value,
                col_19: document.getElementById('col_19').value,
                col_20: document.getElementById('col_20').value,
                col_21: document.getElementById('col_21').value,
                col_22: document.getElementById('col_22').value,
                col_23: document.getElementById('col_23').value,
                // Marcamos que ya fue completado
                ESTADO: "Completado" 
            };

            // Nota: Aquí usarás la misma llamada fetch que tienes configurada en tu config.js y home.js
            console.log("Enviando estos datos a la base de datos:", datosChecklist);
            
            // Simulación o llamada real (Descomentar al enlazar tu Apps Script)
            /*
            try {
                const response = await fetch(CONFIG.URL_APPS_SCRIPT, {
                    method: 'POST',
                    mode: 'cors',
                    body: JSON.stringify(datosChecklist)
                });
                const res = await response.json();
                if (res.status === "ÉXITO") {
                    alert("¡Checklist guardado exitosamente!");
                    window.location.href = "home.html";
                } else {
                    throw new Error(res.error);
                }
            } catch (error) {
                alert("Error al guardar: " + error.message);
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-save"></i> Guardar Checklist';
            }
            */
            
            // Simulación de éxito temporal:
            setTimeout(() => {
                alert("¡Guardado correctamente! (Simulado)");
                window.location.href = "home.html";
            }, 1500);
        }
    </script>
</body>
</html>
